  name: Build, Push and Deploy

  on:
    push:
      branches:
        - main

  jobs:
    docker:
      runs-on: self-hosted
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Run GitLeaks
          run: |
            gitleaks detect --source "${{ github.workspace }}" --verbose

        - name: Run Semgrep
          run: |
           semgrep scan --config p/owasp-top-ten .

        - name: Login to Docker Hub
          run: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

        - name: Build Docker Image
          run: |
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest .

        - name: Generate SBOM with Syft
          run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/output" \
            anchore/syft:latest \
            docker:${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest \
            -o spdx-json=/output/sbom.spdx.json

        - name: Upload SBOM
          uses: actions/upload-artifact@v4
          with:
            name: sbom
            path: sbom.spdx.json

        - name: Trivy
          run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image \
            ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest

        - name: Push Docker Image
          run: |
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest

        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1.2.0
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest

              docker stop devsecops-demo || true
              docker rm devsecops-demo || true

              docker run -d \
                --name devsecops-demo \
                -p 3001:80 \
                --restart unless-stopped \
                ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest

        - name: Create Python Virtual Environment
          run: |
            python3 -m venv .venv

        - name: Install Python Dependencies
          run: |
            source .venv/bin/activate
            pip install -r requirements.txt

        - name: Run Pytest + Selenium
          run: |
            source .venv/bin/activate
            pytest tests/ -v

        - name: Upload Selenium Screenshot
          uses: actions/upload-artifact@v4
          with:
            name: selenium-screenshot
            path: homepage.png

    zap_scan:
        needs: docker
        runs-on: ubuntu-latest

        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: OWASP ZAP Baseline Scan
          uses: zaproxy/action-baseline@v0.14.0
          with:
            target: "http://13.55.206.152:3001"
            cmd_options: "-a"
            allow_issue_writing: false

        - name: Upload ZAP Report
          uses: actions/upload-artifact@v4
          with:
            name: zap-report
            path: report_html.html