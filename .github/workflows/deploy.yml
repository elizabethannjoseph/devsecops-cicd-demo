  name: Build, Push and Deploy

  on:
    push:
      branches:
        - main

  jobs:
    docker:
      runs-on: self-hosted

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Run GitLeaks CLI
          run: |
            docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --verbose

        - name: Check Secrets
          run: |
            echo "Username: ${{ secrets.DOCKERHUB_USERNAME }}"
            
        - name: Login to Docker Hub
          run: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

        - name: Build Docker Image
          run: |
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest .

        - name: Push Docker Image
          run: |
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest

        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1.2.0
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest

              docker stop devsecops-demo || true
              docker rm devsecops-demo || true

              docker run -d \
                --name devsecops-demo \
                -p 3001:80 \
                --restart unless-stopped \
                ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo:latest